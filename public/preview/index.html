<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>無料サンプル</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      body {
        margin: 0;
        font-family: Arial, "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: #ffffff;
        color: #111111;
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      .header {
        text-align: center;
        margin-bottom: 28px;
      }

      .title {
        font-size: 28px;
        font-weight: 800;
        margin: 0 0 10px;
      }

      .desc {
        font-size: 14px;
        line-height: 1.7;
        color: #555555;
        margin: 0;
      }

      .sample-img {
        width: 100%;
        display: block;
        margin-bottom: 18px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      }

      .cta-box {
        margin-top: 28px;
        padding: 24px 16px;
        border-radius: 16px;
        background: #f7f7f7;
        text-align: center;
      }

      .cta-title {
        font-size: 20px;
        font-weight: 800;
        margin: 0 0 10px;
      }

      .cta-desc {
        font-size: 14px;
        line-height: 1.7;
        color: #555555;
        margin: 0 0 18px;
      }

      .cta-btn {
        display: inline-block;
        padding: 14px 24px;
        background: #ff6b4a;
        color: #ffffff;
        text-decoration: none;
        border-radius: 999px;
        font-weight: 700;
        font-size: 15px;
      }

      .note {
        margin-top: 14px;
        font-size: 12px;
        color: #777777;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <h1 class="title">無料サンプル</h1>
        <p class="desc">
          LINE友だち追加いただいた方限定で、<br />
          「ユジンとエヴァンの韓国語」Starter Pack の一部を公開しています。
        </p>
      </div>

      <img src="/preview/dialogue.jpg" alt="sample dialogue" class="sample-img" />
      <img src="/preview/goals.jpg" alt="sample goals" class="sample-img" />
      <img src="/preview/pronunciation.jpg" alt="sample pronunciation" class="sample-img" />
      <img src="/preview/practice.jpg" alt="sample practice" class="sample-img" />

      <div class="cta-box">
        <h2 class="cta-title">続きが気になる方へ</h2>
        <p class="cta-desc">
          Starter Pack 完全版では、<br />
          ストーリー・音声・学習導線をまとめてご利用いただけます。
        </p>

        <a
          href="https://starter-pack-landing-jp.vercel.app/#pricing"
          class="cta-btn"
        >
          Starter Packはこちら
        </a>

        <p class="note">
          ※ 本サンプルは体験版です。<br />
          無断転載・共有はご遠慮ください。
        </p>
      </div>
    </div>
  </body>
</html>
